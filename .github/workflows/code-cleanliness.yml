name: Code Cleanliness Audit

on:
  # Run weekly on Monday at 9am UTC
  schedule:
    - cron: '0 9 * * 1'
  # Allow manual trigger
  workflow_dispatch:
  # Run on PRs to catch issues early
  pull_request:
    branches: [main]

jobs:
  audit:
    name: Run Code Cleanliness Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (unused imports & dead code)
        run: npx eslint . --max-warnings 0
        continue-on-error: true

      - name: Run TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run feature flag audit
        run: node scripts/audit-flags.mjs --max-age-days=90

      - name: Run full code cleanliness audit
        run: node scripts/audit-all.mjs

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Code Cleanliness: Stale code detected (${new Date().toISOString().split('T')[0]})`;
            const body = [
              '## Code Cleanliness Audit Failed',
              '',
              'The weekly code cleanliness audit has detected issues that need attention.',
              '',
              '### What to do',
              '1. Run `npm run audit` locally to see the full report',
              '2. Clean up any stale feature flags (`npm run audit:flags`)',
              '3. Remove unused imports and dead code (`npm run audit:dead-code`)',
              '4. Fix any ESLint warnings (`npm run lint`)',
              '',
              `[View workflow run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['tech-debt', 'automated'],
            });
