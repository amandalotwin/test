name: Sync Design Spec to Notion

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'scripts/sync-notion.js'
      - 'scripts/analyze-changes.js'
      - 'scripts/generate-review.js'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    outputs:
      has_tier1: ${{ steps.analyze.outputs.has_tier1 }}
      has_tier2: ${{ steps.analyze.outputs.has_tier2 }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Analyze changes
        id: analyze
        run: |
          ANALYSIS=$(node scripts/analyze-changes.js)
          echo "$ANALYSIS" > /tmp/analysis.json
          echo "Analysis result:"
          echo "$ANALYSIS" | head -100

          TIER1_COUNT=$(echo "$ANALYSIS" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf-8');const a=JSON.parse(d);console.log(a.tier1.length)")
          TIER2_COUNT=$(echo "$ANALYSIS" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf-8');const a=JSON.parse(d);console.log(a.tier2.length)")

          echo "Devin Automatic changes: $TIER1_COUNT"
          echo "Human Review changes: $TIER2_COUNT"

          echo "has_tier1=$( [ "$TIER1_COUNT" -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "has_tier2=$( [ "$TIER2_COUNT" -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Upload analysis
        uses: actions/upload-artifact@v4
        with:
          name: analysis
          path: /tmp/analysis.json

  # ── Devin Automatic: Auto-update Notion directly ──
  auto-sync:
    needs: analyze
    if: needs.analyze.outputs.has_tier1 == 'true' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Auto-sync design spec to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: |
          echo "Devin Automatic changes detected — auto-updating Notion page..."
          node scripts/sync-notion.js

  # ── Human Review: Auto-update Notion AND create a review issue ──
  review-sync:
    needs: analyze
    if: needs.analyze.outputs.has_tier2 == 'true' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Auto-sync design spec to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: |
          echo "Tier 2 changes detected — auto-updating Notion page..."
          node scripts/sync-notion.js

      - name: Download analysis
        uses: actions/download-artifact@v4
        with:
          name: analysis
          path: /tmp

      - name: Create review issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGES=$(cat /tmp/analysis.json | node -e "
            const d=require('fs').readFileSync('/dev/stdin','utf-8');
            const a=JSON.parse(d);
            const lines=a.tier2.map(c => '- **' + c.type + '**: ' + c.description);
            console.log(lines.join('\n'));
          ")
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          gh issue create \
            --title "Notion doc updated: please review (${{ github.event.head_commit.timestamp || github.run_id }})" \
            --label "documentation" \
            --body "## Notion Documentation Auto-Updated — Review Needed

          The Notion design spec page has been automatically updated with the following changes. Please review the Notion page to ensure the updates are accurate.

          ### Changes detected
          ${CHANGES}

          ### What to do
          1. Open the Notion design spec page and review the updated sections
          2. If anything looks wrong, trigger a manual re-sync from the Actions tab or edit the Notion page directly
          3. Close this issue once reviewed

          ### Commit
          [\`${SHORT_SHA}\`](${{ github.server_url }}/${{ github.repository }}/commit/${COMMIT_SHA})"

  # ── Fallback: Full sync on manual trigger ──
  full-sync:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Full sync design spec to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: |
          echo "Manual trigger — running full Notion sync..."
          node scripts/sync-notion.js
