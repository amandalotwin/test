name: Sync Design Spec to Notion

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'scripts/sync-notion.js'
      - 'scripts/analyze-changes.js'
      - 'scripts/generate-review.js'
  issues:
    types: [closed]
  workflow_dispatch:

jobs:
  analyze:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      has_tier1: ${{ steps.analyze.outputs.has_tier1 }}
      has_tier2: ${{ steps.analyze.outputs.has_tier2 }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Analyze changes
        id: analyze
        run: |
          ANALYSIS=$(node scripts/analyze-changes.js)
          echo "$ANALYSIS" > /tmp/analysis.json
          echo "Analysis result:"
          echo "$ANALYSIS" | head -100

          TIER1_COUNT=$(echo "$ANALYSIS" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf-8');const a=JSON.parse(d);console.log(a.tier1_nyc.length)")
          TIER2_COUNT=$(echo "$ANALYSIS" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf-8');const a=JSON.parse(d);console.log(a.tier2_nyc.length)")

          echo "Devin Automatic changes: $TIER1_COUNT"
          echo "Human Review changes: $TIER2_COUNT"

          echo "has_tier1=$( [ "$TIER1_COUNT" -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "has_tier2=$( [ "$TIER2_COUNT" -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Upload analysis
        uses: actions/upload-artifact@v4
        with:
          name: analysis
          path: /tmp/analysis.json

  # ── Devin Automatic: Auto-update Notion directly ──
  auto-sync:
    needs: analyze
    if: needs.analyze.outputs.has_tier1 == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Auto-sync design spec to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: |
          echo "Devin Automatic changes detected — auto-updating Notion page..."
          node scripts/sync-notion.js

  # ── Human Review: Create issue describing proposed Notion updates ──
  review-issue:
    needs: analyze
    if: needs.analyze.outputs.has_tier2 == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download analysis
        uses: actions/download-artifact@v4
        with:
          name: analysis
          path: /tmp

      - name: Create review issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGES=$(cat /tmp/analysis.json | node -e "
            const d=require('fs').readFileSync('/dev/stdin','utf-8');
            const a=JSON.parse(d);
            const lines=a.tier2_nyc.map(c => '- **' + c.type + '**: ' + c.description);
            console.log(lines.join('\n'));
          ")
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          gh issue create \
            --title "Notion doc update: review needed (${{ github.event.head_commit.timestamp || github.run_id }})" \
            --label "documentation" \
            --body "## Proposed Notion Documentation Updates

          The following code changes were detected that will update the Notion design spec. **Close this issue to approve the update and sync to Notion.**

          ### Changes to be applied
          ${CHANGES}

          ### What to do
          1. Review the changes listed above
          2. **Close this issue** to approve — this will trigger the Notion sync automatically
          3. If you do not want to update Notion, add the \`skip-sync\` label before closing

          ### Commit
          [\`${SHORT_SHA}\`](${{ github.server_url }}/${{ github.repository }}/commit/${COMMIT_SHA})"

  # ── Approved: Sync Notion when a review issue is closed ──
  approved-sync:
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'closed' &&
      contains(github.event.issue.labels.*.name, 'documentation') &&
      !contains(github.event.issue.labels.*.name, 'skip-sync')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync design spec to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: |
          echo "Review issue #${{ github.event.issue.number }} closed — syncing Notion page..."
          node scripts/sync-notion.js

  # ── Fallback: Full sync on manual trigger ──
  full-sync:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Full sync design spec to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: |
          echo "Manual trigger — running full Notion sync..."
          node scripts/sync-notion.js
